<!DOCTYPE html>
<html>
<head>
    <title>Monica's Netflix</title>
    <style>
        body { background-color: #141414; color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; }
        .nav { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); }
        .logo { color: #E50914; font-size: 30px; font-weight: bold; }
        .controls { padding: 20px 5%; background: #222; display: flex; gap: 10px; flex-wrap: wrap; }
        .controls input { padding: 10px; border-radius: 4px; border: none; flex: 1; min-width: 150px; background: #333; color: white; }
        button { padding: 10px 20px; background-color: #E50914; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 40px 5%; }
        .movie-card { background: #181818; border-radius: 8px; overflow: hidden; transition: 0.3s; border: 1px solid #333; padding: 15px; text-align: center; }
        .movie-card:hover { transform: scale(1.05); }
        .movie-card img { width: 100%; height: 280px; object-fit: cover; border-radius: 4px; cursor: pointer; }
        
        /* Modal for Video Player */
        #detailsModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:#222; padding:30px; border-radius:8px; width:90%; max-width:700px; border: 1px solid #444; }
        #videoContainer { position: relative; width: 100%; padding-top: 56.25%; background: #000; margin-bottom: 20px; }
        #trailerVideo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="nav">
        <div class="logo">NETFLIX</div>
        <button onclick="document.getElementById('loginModal').style.display='flex'">Sign In</button>
    </div>

    <div class="controls">
        <input type="text" id="titleIn" placeholder="Title">
        <input type="text" id="genreIn" placeholder="Genre">
        <input type="number" id="yearIn" placeholder="Year">
        <input type="text" id="posterIn" placeholder="Poster URL">
        <input type="text" id="trailerIn" placeholder="YouTube Link (e.g. https://youtube.com...)">
        <input type="text" id="descIn" placeholder="Story Description">
        <button onclick="addMovie()">+ Add Movie</button>
    </div>

    <div class="movie-grid" id="movieGrid"></div>

    <div id="detailsModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="color:#E50914;"></h2>
            <div id="videoContainer">
                <iframe id="trailerVideo" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
            <p id="modalDesc" style="color:#ccc; line-height:1.5;"></p>
            <button onclick="closeDetails()" style="background:#444; width:100%;">Close Player</button>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin + '/movies';

        async function fetchMovies() {
            const res = await fetch(API_URL);
            const movies = await res.json();
            document.getElementById('movieGrid').innerHTML = movies.map(movie => `
                <div class="movie-card">
                    <img src="${movie.posterUrl}" onclick="openDetails('${movie.title.replace(/'/g, "\\'")}', '${(movie.description || "").replace(/'/g, "\\'")}', '${movie.trailerUrl}')">
                    <h3>${movie.title}</h3>
                    <button onclick="openDetails('${movie.title.replace(/'/g, "\\'")}', '${(movie.description || "").replace(/'/g, "\\'")}', '${movie.trailerUrl}')" style="width:100%; background:white; color:black; margin-top:10px;">Watch Trailer</button>
                </div>
            `).join('');
        }

        function openDetails(title, desc, trailerUrl) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerText = desc || "No description provided.";
            
            // Convert normal YouTube link to Embed link
            let videoId = "";
            if (trailerUrl.includes("v=")) {
                videoId = trailerUrl.split("v=")[1].split("&")[0];
            } else if (trailerUrl.includes("youtu.be/")) {
                videoId = trailerUrl.split("youtu.be/")[1].split("?")[0];
            }

            if (videoId) {
                document.getElementById('trailerVideo').src = "https://youtube.com" + videoId + "?autoplay=1";
                document.getElementById('detailsModal').style.display = 'flex';
            } else {
                alert("No valid YouTube link found for this movie!");
            }
        }

        function closeDetails() {
            document.getElementById('trailerVideo').src = "";
            document.getElementById('detailsModal').style.display = 'none';
        }

        async function addMovie() {
            const movieData = {
                title: document.getElementById('titleIn').value,
                genre: document.getElementById('genreIn').value,
                year: document.getElementById('yearIn').value,
                posterUrl: document.getElementById('posterIn').value,
                trailerUrl: document.getElementById('trailerIn').value,
                description: document.getElementById('descIn').value
            };

            await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(movieData)
            });
            fetchMovies();
        }

        fetchMovies();
    </script>
</body>
</html>
