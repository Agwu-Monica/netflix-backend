<!DOCTYPE html>
<html>
<head>
    <title>Netflix Clone</title>
    <style>
        body { background-color: #141414; color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; }
        .nav { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.7) 10%, rgba(0,0,0,0)); }
        .logo { color: #E50914; font-size: 40px; font-weight: bold; letter-spacing: -2px; }
        .controls { padding: 20px 5%; background: #222; display: flex; gap: 10px; flex-wrap: wrap; }
        .controls input { padding: 10px; border-radius: 4px; border: none; flex: 1; background: #333; color: white; }
        button { padding: 10px 20px; background-color: #E50914; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 40px 5%; }
        .movie-card { background: #181818; border-radius: 4px; overflow: hidden; transition: transform 0.3s; border: 1px solid #333; padding: 15px; position: relative; }
        .movie-card:hover { transform: scale(1.05); z-index: 2; }
        .movie-card img { width: 100%; height: 280px; object-fit: cover; border-radius: 4px; cursor: pointer; }
        
        /* Buttons container - always visible now for better UX */
        .card-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-play { flex: 2; background: white; color: black; padding: 8px; border-radius: 4px; font-weight: bold; border: none; cursor: pointer; }
        .btn-play:hover { background: #e6e6e6; }
        .btn-delete { flex: 1; background: transparent; border: 1px solid #E50914; color: #E50914; padding: 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }

        /* Trailer Popup Styling */
        #detailsModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:#222; padding:30px; border-radius:8px; width:90%; max-width:650px; text-align:center; border: 1px solid #444; }
        
        #videoContainer { position: relative; width: 100%; padding-top: 56.25%; margin-bottom: 20px; border-radius: 4px; overflow: hidden; background: #000; }
        #trailerVideo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="nav">
        <div class="logo">NETFLIX</div>
        <input type="text" id="searchBar" placeholder="Search..." onkeyup="searchMovies()" style="padding:10px; border-radius:4px; width:250px; border:none; background:#333; color:white;">
    </div>

    <div class="controls">
        <input type="text" id="titleInput" placeholder="Title">
        <input type="text" id="genreInput" placeholder="Genre">
        <input type="number" id="yearInput" placeholder="Year">
        <input type="text" id="posterInput" placeholder="Poster URL">
        <input type="text" id="descInput" placeholder="Story/Description">
        <button onclick="addMovie()">+ Add Movie</button>
    </div>

    <div class="movie-grid" id="movieGrid"></div>

    <!-- POPUP MODAL -->
    <div id="detailsModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="color:#E50914; margin-bottom: 15px; font-size: 24px;"></h2>
            
            <div id="videoContainer">
                <iframe id="trailerVideo" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <p id="modalDesc" style="line-height:1.6; color:#ccc; margin-bottom: 20px; font-size: 14px; max-height: 100px; overflow-y: auto;"></p>
            <button onclick="closeDetails()" style="background:#444; width: 100%;">Close Preview</button>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin + '/movies';

        async function fetchMovies() {
            try {
                const res = await fetch(API_URL);
                const movies = await res.json();
                document.getElementById('movieGrid').innerHTML = movies.map(movie => {
                    // Clean strings to prevent errors with quotes/apostrophes
                    const safeTitle = (movie.title || "").replace(/'/g, "\\'");
                    const safeDesc = (movie.description || "No story added yet.").replace(/'/g, "\\'");
                    const safePoster = (movie.posterUrl || "").replace(/'/g, "\\'");

                    return `
                        <div class="movie-card">
                            <img src="${movie.posterUrl || 'https://placeholder.com'}" 
                                 onclick="openDetails('${safeTitle}', '${safeDesc}')">
                            <h3 style="margin-top:10px; font-size: 16px;">${movie.title}</h3>
                            <p>${movie.genre} • ${movie.year}</p>
                            <div class="card-actions">
                                <button class="btn-play" onclick="openDetails('${safeTitle}', '${safeDesc}')">▶ Play</button>
                                <button class="btn-delete" onclick="deleteMovie('${movie.id}')">Delete</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) { console.error(err); }
        }

        function openDetails(title, desc) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerText = desc;
            
            // Corrected YouTube search URL
            const searchQuery = encodeURIComponent(title + " official trailer");
            document.getElementById('trailerVideo').src = "https://youtube.com" + searchQuery;
            
            document.getElementById('detailsModal').style.display = 'flex';
        }

        function closeDetails() {
            document.getElementById('trailerVideo').src = "";
            document.getElementById('detailsModal').style.display = 'none';
        }

        async function addMovie() {
            const title = document.getElementById('titleInput').value;
            const genre = document.getElementById('genreInput').value;
            const year = document.getElementById('yearInput').value;
            const posterUrl = document.getElementById('posterInput').value;
            const description = document.getElementById('descInput').value;

            if(!title) return alert("Please enter a title");

            await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ title, genre, year, posterUrl, description })
            });
            
            // Reset inputs
            document.getElementById('titleInput').value = '';
            document.getElementById('genreInput').value = '';
            document.getElementById('yearInput').value = '';
            document.getElementById('posterInput').value = '';
            document.getElementById('descInput').value = '';
            
            fetchMovies();
        }

        async function deleteMovie(id) {
            if(confirm("Delete this movie?")) {
                await fetch(API_URL + '/' + id, { method: 'DELETE' });
                fetchMovies();
            }
        }

        function searchMovies() {
            let filter = document.getElementById('searchBar').value.toLowerCase();
            let cards = document.getElementsByClassName('movie-card');
            for (let card of cards) {
                let title = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = title.includes(filter) ? "" : "none";
            }
        }

        fetchMovies();
    </script>
</body>
</html>
