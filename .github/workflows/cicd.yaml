name: Multi-Cloud Master Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Check System Info
        run: hostnamectl

      # --- STEP 3: LOGIN TO GITHUB ---
      - name: 3. Login to GitHub Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- STEP 4: LOGIN TO AZURE ---
      - name: 4. Login to Azure Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.AZURE_REGISTRY_SERVER }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      # --- STEP 5: AWS (DISABLED TEMPORARILY) ---
      # - name: 5. Login to AWS ECR
      #   uses: aws-actions/amazon-ecr-login@v2
      #   env:
      #     AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     AWS_REGION: us-east-1

      # --- STEP 6: BUILD AND PUSH ---
      - name: 6. Build and Push to All
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Note: We only tag GitHub and Azure for now
          tags: |
            ghcr.io/agwu-monica/netflix-backend:latest
            ${{ secrets.AZURE_REGISTRY_SERVER }}/netflix-backend:latest
