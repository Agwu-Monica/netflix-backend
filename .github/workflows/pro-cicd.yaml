name: Professional Build (Industry Standard)

on:
  push:
    branches: [ "main" ]

jobs:
  pro-job:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 1. Grab code
        uses: actions/checkout@v4

      - name: 2. Check System Info
        run: hostnamectl

      - name: 3. Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 4. Build and Push (All-in-One)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/netflix-pro:latest
